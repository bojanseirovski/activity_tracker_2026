service: masiboard-be
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  environment:
    DATABASE_URL: ${env:DATABASE_URL}
    JWT_SECRET: ${env:JWT_SECRET}
    CORS_ORIGIN: ${env:CORS_ORIGIN}
    MAILERSEND_API_KEY: ${env:MAILERSEND_API_KEY}
    MAILERSEND_FROM_EMAIL: ${env:MAILERSEND_FROM_EMAIL}
    FRONTEND_URL: ${env:FRONTEND_URL}
    S3_BUCKET: ${env:S3_BUCKET}
    S3_REGION: ${env:S3_REGION}
    NODE_ENV: production
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:DeleteObject
          Resource: arn:aws:s3:::${env:S3_BUCKET}/*

functions:
  api:
    handler: dist/server.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: any
      - httpApi:
          path: /
          method: any

plugins:
  - serverless-offline

package:
  patterns:
    - '!src/**'
    - '!.env'
    - '!Dockerfile*'
    - '!docker-compose*'
    - '!*.md'